<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>qChess</title>

	<style>
		body {
			background: #000;
			overflow: hidden;
			margin: 0;
		}
		p {
			position: absolute;
			top: 50%;
			left: 50%;
			transform: translate(-50%, -50%);

			color: #fff;
			font-family: Arial;
			font-size: 5vh;
			margin: 0;
		}
	</style>
</head>
<body>
	<p id="msg">Loading...</p>
	<script>
		const msg = document.getElementById('msg');
		const params = new URLSearchParams(window.location.search);
		
		if (params.get('c')) {
			fetch(`https://api.qchess.pro/?s=c&c=${params.get('c')}`)
				.then(r => r.json())
				.then(data => {
					window.location.href = `/analysis?${encodeURIComponent(data.moveList)}`;
				});
		} else if (params.get('l')) {
			fetch(`https://api.qchess.pro/?s=l&c=${params.get('l')}`)
				.then(r => r.json())
				.then(data => {
					window.location.href = `/analysis/load/algebraic?${encodeURIComponent(data.moves)}`;
				});
		}
	</script>
</body>
</html>
