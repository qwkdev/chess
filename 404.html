<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>qChess</title>

	<style>
		body {
			background: #000;
			overflow: hidden;
			margin: 0;
		}
		p {
			position: absolute;
			top: 50%;
			left: 50%;
			transform: translate(-50%, -50%);

			color: #fff;
			font-family: Arial;
			font-size: 5vh;
			margin: 0;
		}
	</style>
</head>
<body>
	<p id="msg">Loading...</p>
	<script>
		const msg = document.getElementById('msg');
		const path = window.location.pathname.slice(1);
		for (const p of [
			'analysis/game/live/',
			'game/live/',
			'game/'
		].flatMap(e => [
			e,
			`http://www.chess.com/${e}`,
			`https://www.chess.com/${e}`,
			`http://chess.com/${e}`,
			`https://chess.com/${e}`,
			`www.chess.com/${e}`,
			`chess.com/${e}`,
		])) {
			if (path.startsWith(p)) {
				const code = path.slice(p.length).split('/')[0];
				msg.innerText = code;
				// window.location.href = `${code}`;
				
				break;
			}
		}
	</script>
</body>
</html>
