		window.chess = {

	<script src="/chess.js"></script>
	<script>
		const game = 'test';
		const client = window.location.search.slice(1);

		const SERVER = 'http://127.0.0.1:5000';

		async function sync() {

		}

		async function sendMove(from, to, promoteTo=null) {
			const move = [
				getSquareName(from.f, from.r),
				getSquareName(to.f, to.r),
				promoteTo
			];
			fetch(`${SERVER}/move`, {
				method: 'POST',
				headers: {
					'Accept': 'application/json',
					'Content-Type': 'application/json',
				},
				body: JSON.stringify({
					game, client, move
				})
			})
				.then(r => r.json())
				.then(r => {
					if (!r.success) setTimeout(() => sendMove(from, to), 1000);
				})
				.catch(e => {
					console.error(e);
					setTimeout(() => sendMove(from, to), 1000);
				});
		}

		window.chess.onmove = sendMove;
		newGame();

		window.chess.color = client === '1' ? 'w' : 'b';

		window.chess.ready = true;
	</script>
